name: Destroy — githubekssp

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy EKS (kubectl + Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.31.0'
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
      - name: Resolve cluster name from state
        id: cluster
        working-directory: terraform
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || true)
          if [ -z "$CLUSTER" ]; then
            BASE=$(echo "${{ secrets.PROJECT_NAME }}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-24 \
              | sed 's/-$//')
            CLUSTER="${BASE}-eks"
          fi
          echo "name=${CLUSTER}" >> $GITHUB_OUTPUT
      - name: Update kubeconfig (best-effort)
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ steps.cluster.outputs.name }}" \
            || echo "Cluster not reachable — continuing with destroy"
      - name: Delete Kubernetes resources before Terraform destroy
        run: |
          NAMESPACE=$(cd terraform && terraform output -raw namespace 2>/dev/null || \
            echo "${{ secrets.PROJECT_NAME }}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-24 \
              | sed 's/-$//') || true
          if ! kubectl version >/dev/null 2>&1; then
            echo "::warning::kubectl cannot reach the cluster — ALB may survive and block VPC destroy"
          fi
          kubectl delete ingress --all -n "$NAMESPACE" --ignore-not-found --timeout=300s || true
          kubectl delete service --all -n "$NAMESPACE" --ignore-not-found --timeout=180s || true
          helm uninstall aws-load-balancer-controller -n kube-system 2>/dev/null || true
          # Wait for ALB and ENIs to be fully released before proceeding
          echo "Waiting 90s for ALB/ENI teardown..."
          sleep 90

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=*${{ secrets.PROJECT_NAME }}*" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            # Disassociate and release EIPs still attached to the VPC
            ENI_IDS=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'NetworkInterfaces[*].NetworkInterfaceId' \
              --output text 2>/dev/null || echo "")
            for ENI in $ENI_IDS; do
              ASSOC=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "$ENI" \
                --query 'NetworkInterfaces[0].Association.AssociationId' \
                --output text 2>/dev/null || echo "")
              if [ -n "$ASSOC" ] && [ "$ASSOC" != "None" ]; then
                aws ec2 disassociate-address --association-id "$ASSOC" 2>/dev/null || true
              fi
            done

            # Release any unattached EIPs in the VPC domain
            ALLOC_IDS=$(aws ec2 describe-addresses \
              --filters "Name=domain,Values=vpc" \
              --query "Addresses[?AssociationId==null].AllocationId" \
              --output text 2>/dev/null || echo "")
            for ALLOC in $ALLOC_IDS; do
              aws ec2 release-address --allocation-id "$ALLOC" 2>/dev/null || true
            done

            # Delete any remaining load balancers in the VPC
            LB_ARNS=$(aws elbv2 describe-load-balancers \
              --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" \
              --output text 2>/dev/null || echo "")
            for LB_ARN in $LB_ARNS; do
              echo "Deleting load balancer: $LB_ARN"
              aws elbv2 delete-load-balancer --load-balancer-arn "$LB_ARN" 2>/dev/null || true
            done

            # Delete any remaining classic ELBs in the VPC
            CLASSIC_LBS=$(aws elb describe-load-balancers \
              --query "LoadBalancerDescriptions[?VPCId=='${VPC_ID}'].LoadBalancerName" \
              --output text 2>/dev/null || echo "")
            for CLB in $CLASSIC_LBS; do
              echo "Deleting classic load balancer: $CLB"
              aws elb delete-load-balancer --load-balancer-name "$CLB" 2>/dev/null || true
            done

            # Wait for load balancers and their ENIs to fully detach
            echo "Waiting 60s for load balancer ENI release..."
            sleep 60

            # Delete any remaining security groups in the VPC (except default)
            SG_IDS=$(aws ec2 describe-security-groups \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'SecurityGroups[?GroupName!=`default`].GroupId' \
              --output text 2>/dev/null || echo "")
            for SG in $SG_IDS; do
              aws ec2 delete-security-group --group-id "$SG" 2>/dev/null || true
            done

            # Detach and delete any remaining internet gateways
            IGW_IDS=$(aws ec2 describe-internet-gateways \
              --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
              --query 'InternetGateways[*].InternetGatewayId' \
              --output text 2>/dev/null || echo "")
            for IGW in $IGW_IDS; do
              aws ec2 detach-internet-gateway --internet-gateway-id "$IGW" --vpc-id "${VPC_ID}" 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id "$IGW" 2>/dev/null || true
            done

            # Delete any remaining subnets
            SUBNET_IDS=$(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'Subnets[*].SubnetId' \
              --output text 2>/dev/null || echo "")
            for SUBNET in $SUBNET_IDS; do
              aws ec2 delete-subnet --subnet-id "$SUBNET" 2>/dev/null || true
            done

            # Delete any remaining route tables (except main)
            RT_IDS=$(aws ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'RouteTables[?Associations[?Main!=`true`]||!Associations].RouteTableId' \
              --output text 2>/dev/null || echo "")
            for RT in $RT_IDS; do
              aws ec2 delete-route-table --route-table-id "$RT" 2>/dev/null || true
            done

            # Delete any remaining network interfaces
            ENI_IDS2=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'NetworkInterfaces[*].NetworkInterfaceId' \
              --output text 2>/dev/null || echo "")
            for ENI in $ENI_IDS2; do
              aws ec2 delete-network-interface --network-interface-id "$ENI" 2>/dev/null || true
            done

            echo "Waiting 30s after VPC dependency cleanup..."
            sleep 30
          fi
      - name: Terraform destroy
        working-directory: terraform
        env:
          TF_VAR_node_instance_type: ${{ secrets.NODE_INSTANCE_TYPE }}
        run: |
          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="container_image=placeholder"